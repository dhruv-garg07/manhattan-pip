name: Build and Upload Protected Wheels

on:
  push:
    tags:
      - 'v*'

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    defaults:
      run:
        working-directory: ./manhattan-mcp

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14' # Updated runner to 3.14

      - name: Install build dependencies
        run: pip install cython setuptools wheel cibuildwheel build

      - name: Build wheels
        shell: bash
        run: python -m cibuildwheel --output-dir ../wheelhouse
        env:
          CIBW_BUILD_FRONTEND: "build"
          CIBW_BEFORE_BUILD: "pip install cython setuptools wheel"
          # ADDED cp313 and cp314 to support newer Python versions
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "pp* *-musllinux*"
          # ADDED x86_64 to support both Intel and Apple Silicon Macs
          CIBW_ARCHS_MACOS: "x86_64 arm64"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: wheelhouse/*.whl

  upload_pypi:
    needs: [build_wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Ensure we checkout the correct path for sdist
          path: ./

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      # THIS IS THE MAGIC FALLBACK: It creates the .tar.gz source distribution
      - name: Build sdist
        run: |
          pip install build
          cd manhattan-mcp
          python -m build --sdist . --outdir ../dist

      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}