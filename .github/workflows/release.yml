name: Build and Upload Protected Wheels

on:
  push:
    tags:
      - 'v*'

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    defaults:
      run:
        working-directory: ./manhattan-mcp

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: pip install cython setuptools wheel cibuildwheel

      - name: Build wheels
        shell: bash
        run: python -m cibuildwheel --output-dir ../wheelhouse
        env:
          CIBW_BUILD_FRONTEND: "pip"
          CIBW_SKIP: "cp36-* cp37-* cp38-* cp39-* pp* *-musllinux*"
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          CIBW_BEFORE_BUILD: "pip install cython setuptools wheel"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: wheelhouse/*.whl

  upload_pypi:
    needs: [build_wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}