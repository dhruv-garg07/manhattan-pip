name: Build and Upload Protected Wheels

on:
  push:
    tags:
      - 'v*' # Runs when you push a version tag like v0.2.25

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # This spins up all three operating systems for you
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12' # Use a stable version for maximum compatibility

      - name: Install build dependencies
        run: pip install cython setuptools wheel cibuildwheel

      - name: Build wheels
        run: python -m cibuildwheel --output-dir wheelhouse
        env:
          # Tell cibuildwheel to use your Cython setup
          CIBW_BUILD_FRONTEND: "setuptools"
          # Only build for modern Python versions (3.10, 3.11, 3.12)
          CIBW_SKIP: "cp36-* cp37-* cp38-* cp39-* pp* *-musllinux*"

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  upload_pypi:
    needs: [build_wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: cibw-wheels-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI_API_TOKEN }}